<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var t=localStorage.getItem('theme');if(!t){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<title>个人知识库导览</title>
<style>
  :root {
    --bg-primary: #f8f9fa;
    --bg-sidebar: #2c3e50;
    --bg-sidebar-hover: #34495e;
    --bg-code: #ecf0f1;
    --bg-pre: #2c3e50;
    --bg-blockquote: #f0f3f5;
    --bg-table-header: #ecf0f1;
    --bg-error-code: #fdf0ef;
    --bg-server-code: #ecf0f1;
    --text-primary: #1a1a1a;
    --text-secondary: #7f8c8d;
    --text-muted: #95a5a6;
    --text-faint: #bdc3c7;
    --text-sidebar: #ecf0f1;
    --text-folder: #2c3e50;
    --text-match: #2c3e50;
    --text-blockquote: #555;
    --text-strong: #2c3e50;
    --text-link: #2980b9;
    --text-toc: #7f8c8d;
    --text-toc-hover: #2980b9;
    --text-toc-active: #2980b9;
    --text-error: #e74c3c;
    --text-toc-title: #2c3e50;
    --text-pre: #ecf0f1;
    --border-heading: #e0e0e0;
    --border-heading-h2: #eee;
    --border-timeline: #ddd;
    --border-search-result: #eee;
    --border-search-input: #ddd;
    --border-toc: #e0e0e0;
    --border-table: #ddd;
    --border-hr: #ddd;
    --border-blockquote: #3498db;
    --accent: #3498db;
    --accent-shadow: rgba(52, 152, 219, 0.2);
    --toggle-bg: #34495e;
    --toggle-bg-hover: #465f77;
  }
  [data-theme="dark"] {
    --bg-primary: #1a1a2e;
    --bg-sidebar: #0f0f1a;
    --bg-sidebar-hover: #1a1a2e;
    --bg-code: #2a2a3e;
    --bg-pre: #0f0f1a;
    --bg-blockquote: #222236;
    --bg-table-header: #2a2a3e;
    --bg-error-code: #3a1a1e;
    --bg-server-code: #2a2a3e;
    --text-primary: #e0e0e8;
    --text-secondary: #9a9ab0;
    --text-muted: #7a7a90;
    --text-faint: #5a5a70;
    --text-sidebar: #c8c8d8;
    --text-folder: #c8c8d8;
    --text-match: #e0e0e8;
    --text-blockquote: #b0b0c0;
    --text-strong: #e0e0e8;
    --text-link: #5dade2;
    --text-toc: #9a9ab0;
    --text-toc-hover: #5dade2;
    --text-toc-active: #5dade2;
    --text-error: #ff6b6b;
    --text-toc-title: #c8c8d8;
    --text-pre: #c8c8d8;
    --border-heading: #2a2a3e;
    --border-heading-h2: #2a2a3e;
    --border-timeline: #2a2a3e;
    --border-search-result: #2a2a3e;
    --border-search-input: #3a3a50;
    --border-toc: #2a2a3e;
    --border-table: #3a3a50;
    --border-hr: #2a2a3e;
    --border-blockquote: #5dade2;
    --accent: #5dade2;
    --accent-shadow: rgba(93, 173, 226, 0.3);
    --toggle-bg: #2a2a3e;
    --toggle-bg-hover: #3a3a50;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; height: 100vh; color: var(--text-primary); background: var(--bg-primary); }
  .sidebar { width: 200px; background: var(--bg-sidebar); color: var(--text-sidebar); display: flex; flex-direction: column; padding-top: 20px; flex-shrink: 0; transition: width 0.2s; }
  .sidebar.collapsed { width: 40px; }
  .sidebar.collapsed .tab, .sidebar.collapsed .title, .sidebar.collapsed .theme-toggle { display: none; }
  .sidebar .title { padding: 0 20px 20px; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
  .tab { padding: 10px 20px; cursor: pointer; font-size: 14px; border-left: 3px solid transparent; transition: all 0.15s; }
  .tab:hover { background: var(--bg-sidebar-hover); }
  .tab.active { background: var(--bg-sidebar-hover); border-left-color: var(--accent); color: var(--text-sidebar); }
  .main { flex: 1; overflow-y: auto; padding: 30px 40px; }
  .main h2 { margin-bottom: 20px; font-size: 22px; border-bottom: 2px solid var(--border-heading); padding-bottom: 10px; }
  .tree-item { margin: 4px 0; }
  .tree-toggle { cursor: pointer; user-select: none; display: inline-block; width: 16px; color: var(--text-secondary); }
  .tree-toggle.open::before { content: "▼"; }
  .tree-toggle.closed::before { content: "▶"; }
  .tree-folder { font-weight: 600; color: var(--text-folder); cursor: pointer; }
  .tree-file { color: var(--text-link); margin-left: 20px; font-size: 14px; cursor: pointer; display: block; }
  .tree-file:hover { text-decoration: underline; }
  .tree-children { margin-left: 16px; }
  .tree-children.collapsed { display: none; }
  .timeline-week { margin-bottom: 24px; }
  .timeline-week h3 { font-size: 16px; color: var(--text-folder); margin-bottom: 8px; }
  .timeline-entry { padding: 6px 0 6px 16px; border-left: 2px solid var(--border-timeline); margin-left: 6px; font-size: 14px; }
  .timeline-entry .date { color: var(--text-secondary); font-size: 12px; }
  .timeline-entry a { color: var(--text-link); text-decoration: none; }
  .timeline-entry a:hover { text-decoration: underline; }
  .timeline-entry .tl-link { color: var(--text-link); cursor: pointer; }
  .timeline-entry .tl-link:hover { text-decoration: underline; }
  .search-input { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid var(--border-search-input); border-radius: 6px; margin-bottom: 20px; outline: none; }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-shadow); }
  .search-result { padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--border-search-result); }
  .search-result .match { color: var(--text-match); font-weight: 600; }
  .search-result .path { color: var(--text-secondary); font-size: 12px; }
  .empty-state { color: var(--text-muted); font-size: 14px; margin-top: 40px; text-align: center; }
  .tree-empty { color: var(--text-faint); cursor: default; }
  .tl-empty { color: var(--text-faint); }
  .server-guide { text-align: center; margin-top: 60px; color: var(--text-secondary); }
  .server-guide code { background: var(--bg-server-code); padding: 2px 8px; border-radius: 4px; font-size: 15px; color: var(--text-folder); }
  .server-guide h2 { border: none; margin-bottom: 12px; }
  .server-hint { font-size: 13px; color: var(--text-muted); }

  .back-link { display: inline-block; margin-bottom: 16px; color: var(--accent); cursor: pointer; font-size: 14px; }
  .back-link:hover { text-decoration: underline; }
  .content-meta { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
  .md-content { line-height: 1.8; font-size: 15px; }
  .md-content h1 { font-size: 26px; margin: 24px 0 12px; border-bottom: 2px solid var(--border-heading); padding-bottom: 8px; }
  .md-content h2 { font-size: 20px; margin: 22px 0 10px; border-bottom: 1px solid var(--border-heading-h2); padding-bottom: 6px; }
  .md-content h3 { font-size: 17px; margin: 18px 0 8px; }
  .md-content p { margin: 8px 0; }
  .md-content ul, .md-content ol { margin: 8px 0 8px 20px; }
  .md-content li { margin: 4px 0; }
  .md-content img { max-width: 100%; height: auto; border-radius: 4px; margin: 8px 0; }
  .md-content del { text-decoration: line-through; opacity: 0.6; }
  .md-content strong { color: var(--text-strong); }
  .md-content code { background: var(--bg-code); padding: 1px 5px; border-radius: 3px; font-size: 13px; font-family: "SF Mono", Monaco, "Cascadia Code", monospace; }
  .md-content pre { background: var(--bg-pre); color: var(--text-pre); padding: 14px 18px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
  .md-content pre code { background: none; padding: 0; font-size: 13px; color: var(--text-pre); }
  .md-content blockquote { border-left: 3px solid var(--border-blockquote); padding: 6px 14px; margin: 12px 0; color: var(--text-blockquote); background: var(--bg-blockquote); border-radius: 0 4px 4px 0; }
  .md-content hr { border: none; border-top: 1px solid var(--border-hr); margin: 16px 0; }
  .md-content table { border-collapse: collapse; margin: 12px 0; font-size: 14px; }
  .md-content th { background: var(--bg-table-header); padding: 6px 12px; border: 1px solid var(--border-table); text-align: left; }
  .md-content td { padding: 6px 12px; border: 1px solid var(--border-table); }
  .md-content a { color: var(--text-link); }
  .sidebar-toggle { display: none; padding: 10px; cursor: pointer; text-align: center; color: var(--text-sidebar); font-size: 18px; }
  .sidebar.collapsed .sidebar-toggle { display: block; }

  .content-with-toc { display: flex; gap: 0; }
  .content-with-toc .md-content { flex: 1; min-width: 0; padding-right: 24px; }
  .toc-sidebar { width: 200px; flex-shrink: 0; position: sticky; top: 20px; align-self: flex-start; max-height: calc(100vh - 40px); overflow-y: auto; border-left: 1px solid var(--border-toc); padding-left: 16px; font-size: 13px; }
  .toc-sidebar .toc-title { font-weight: 600; color: var(--text-toc-title); margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .toc-sidebar a { display: block; color: var(--text-toc); text-decoration: none; padding: 3px 0; border-left: 2px solid transparent; padding-left: 8px; margin-left: -10px; transition: all 0.15s; line-height: 1.4; }
  .toc-sidebar a:hover { color: var(--text-toc-hover); }
  .toc-sidebar a.active { color: var(--text-toc-active); border-left-color: var(--accent); font-weight: 500; }
  .toc-sidebar a.toc-h2 { padding-left: 8px; }
  .toc-sidebar a.toc-h3 { padding-left: 20px; font-size: 12px; }

  .theme-toggle { padding: 10px 20px; cursor: pointer; font-size: 14px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; user-select: none; transition: background 0.15s; }
  .theme-toggle:hover { background: var(--bg-sidebar-hover); }
  .theme-toggle:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
  .theme-icon { display: inline-block; transition: transform 0.2s; }
  .mermaid-error { color: var(--text-error); font-size: 12px; }

  .load-error { padding: 40px; text-align: center; color: var(--text-error); }
  .load-error code { background: var(--bg-error-code); padding: 2px 8px; border-radius: 4px; }

  /* Mermaid diagrams — 重置 line-height 防止外层 1.8 被 SVG foreignObject 继承导致多行文本节点被裁剪 */
  .mermaid { display: flex; justify-content: center; margin: 16px 0; line-height: 1.2; }
  .mermaid svg { max-width: 100%; height: auto; overflow: visible; }
  .mermaid .nodeLabel { line-height: 1.2; }
  .mermaid foreignObject { overflow: visible; }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="title">知识库导览</div>
  <div class="sidebar-toggle" title="展开侧栏" onclick="toggleSidebar()">☰</div>
  <div class="tab active" data-tab="categories">分类导览</div>
  <div class="tab" data-tab="timeline">时间线</div>
  <div class="tab" data-tab="search">搜索</div>
  <div class="theme-toggle" id="themeToggle" title="切换深色模式" onclick="toggleTheme()" role="button" tabindex="0" aria-label="切换深色模式">
    <span class="theme-icon" id="themeIcon">&#127769;</span>
  </div>
</div>

<div class="main" id="main"></div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@18.0.3/lib/marked.umd.js"></script>
<script src="scripts/app.js"></script>
</body>
</html>
